<title>愛知の子連れおでかけプランを自動作成｜あいち子育ておでかけマップ</title>
<meta name="description" content="出発地・日程・お子さんの年齢・予算を選ぶだけで、愛知の子連れおでかけプランを自動作成。天気予報も自動反映して雨の日は室内プランに。移動時間・費用の目安つきタイムラインで、きょうのおでかけがすぐ決まります。">
<link rel="canonical" href="https://nishimikawa-odekake.github.io/plan.html">
<meta property="og:type" content="website">
<meta property="og:title" content="🎯きょうのプラン｜愛知の子連れおでかけを自動作成">
<meta property="og:description" content="質問に答えるだけ。天気も反映して、きょうの家族おでかけプランを自動作成します。">
<meta property="og:url" content="https://nishimikawa-odekake.github.io/plan.html">
<meta name="theme-color" content="#e08a5b">
<style>
:root{
  --bg:#faf6ef; --card:#fffdf9; --ink:#3d3a34; --sub:#7a746a; --line:#e7ddcd;
  --accent:#e08a5b; --accent-d:#c9713f;
  --animal:#E9A23B; --active:#4CAF6E; --water:#3FA9D6; --create:#9B6DD6; --vehicle:#E06C75; --indoor:#7A8AA0; --food:#D95D77;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-text-size-adjust:100%}
a{color:var(--accent-d)}
.wrap{max-width:620px;margin:0 auto;padding:0 14px 40px}
header.top{background:linear-gradient(160deg,#fbe6d3,#f6ede0);border-bottom:1px solid var(--line);padding:16px 14px 14px;text-align:center}
header.top h1{font-size:1.18rem;margin:0 0 3px;color:var(--accent-d)}
header.top p{font-size:.8rem;color:var(--sub);margin:0}
header.top a.home{display:inline-block;margin-top:8px;font-size:.78rem;color:var(--sub);text-decoration:none}
header.top a.home:hover{color:var(--accent-d)}

/* progress dots */
.dots{display:flex;gap:8px;justify-content:center;margin:18px 0 6px}
.dots .d{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}
.dots .d.on{background:var(--accent);transform:scale(1.15)}
.dots .d.done{background:var(--accent-d)}

/* wizard */
.step{display:none;animation:fade .25s ease}
.step.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.q{font-size:1.15rem;font-weight:800;text-align:center;margin:18px 0 4px;color:var(--ink)}
.qsub{font-size:.8rem;color:var(--sub);text-align:center;margin:0 0 16px}
.bigbtns{display:flex;flex-direction:column;gap:10px}
.bigbtn{border:2px solid var(--line);background:var(--card);border-radius:16px;padding:16px;font-size:1.02rem;font-weight:700;color:var(--ink);cursor:pointer;text-align:center;transition:.12s;box-shadow:0 2px 6px rgba(160,140,110,.12)}
.bigbtn:hover{border-color:var(--accent)}
.bigbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.bigbtn small{display:block;font-size:.72rem;font-weight:600;opacity:.8;margin-top:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select.origin{width:100%;padding:14px;font-size:1rem;border:2px solid var(--line);border-radius:14px;background:var(--card);color:var(--ink);font-weight:700}
.geo{margin-top:10px;width:100%;border:2px dashed var(--accent);background:#fff6ee;border-radius:14px;padding:12px;font-size:.92rem;font-weight:700;color:var(--accent-d);cursor:pointer}
.geo:active{background:#ffe9d8}
.geonote{font-size:.72rem;color:var(--sub);text-align:center;margin:8px 0 0;min-height:1em}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.back{border:none;background:transparent;color:var(--sub);font-size:.9rem;cursor:pointer;padding:8px 4px;text-decoration:underline}
.next{border:none;background:var(--accent);color:#fff;font-weight:800;border-radius:999px;padding:12px 28px;font-size:1rem;cursor:pointer;box-shadow:0 3px 10px rgba(200,113,63,.3)}
.next:disabled{opacity:.4;cursor:default;box-shadow:none}

/* loading */
.loading{text-align:center;padding:50px 10px}
.spinner{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* result */
#result{display:none}
.wxbadge{display:inline-block;background:#fff6ee;border:1.5px solid var(--accent);color:var(--accent-d);border-radius:999px;padding:7px 14px;font-size:.82rem;font-weight:800;margin:4px 0 14px}
.plancard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 14px;box-shadow:0 3px 12px rgba(160,140,110,.14);margin-bottom:16px}
.plantitle{font-size:1.02rem;font-weight:800;color:var(--accent-d);margin:0 0 2px}
.plantitle small{font-size:.74rem;font-weight:600;color:var(--sub)}
.timeline{margin:14px 0 4px;position:relative}
.tl{display:flex;gap:12px;padding:0 0 16px;position:relative}
.tl:last-child{padding-bottom:0}
.tl .rail{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;width:52px}
.tl .time{font-size:.82rem;font-weight:800;color:var(--ink);white-space:nowrap}
.tl .icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;margin-top:3px;background:#fff6ee;border:2px solid var(--accent)}
.tl.move .icon{background:#eef2f6;border-color:#c9d3dd;font-size:.95rem}
.tl .line{flex:1;width:2px;background:var(--line);margin-top:2px}
.tl:last-child .line{display:none}
.tl .body{flex:1;padding-bottom:4px;min-width:0}
.tl .sname{font-weight:800;font-size:1rem;margin:2px 0 2px;color:var(--ink)}
.tl.move .sname{font-weight:700;font-size:.9rem;color:var(--sub)}
.tl .appeal{font-size:.85rem;color:#5a4632;background:#fff6ee;border-left:3px solid var(--accent);border-radius:5px;padding:5px 8px;margin:4px 0 6px}
.tl .meta{font-size:.78rem;color:var(--sub);margin:0 0 6px}
.tl .opt{display:inline-block;font-size:.7rem;font-weight:800;background:#f0ead9;color:#8a7a4a;border-radius:6px;padding:2px 7px;margin-bottom:4px}
.tl .links{display:flex;gap:8px;flex-wrap:wrap}
.tl .links a{font-size:.78rem;font-weight:700;text-decoration:none;border-radius:999px;padding:6px 12px;border:1.5px solid var(--accent);color:var(--accent-d)}
.tl .links a.map{border-color:#c9d3dd;color:#5b6572}
.summary{background:#f6ede0;border-radius:12px;padding:12px 14px;font-size:.86rem;color:#5a4632;margin-top:6px}
.summary b{color:var(--accent-d)}
.actions{display:flex;flex-direction:column;gap:10px;margin:18px 0 8px}
.actions button,.actions a{display:block;text-align:center;text-decoration:none;border-radius:14px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;border:2px solid transparent}
.act-reroll{background:var(--accent);color:#fff;border:none}
.act-map{background:#fff;color:var(--accent-d);border:2px solid var(--accent)}
.act-restart{background:transparent;color:var(--sub);border:none;text-decoration:underline;font-weight:600;font-size:.9rem;padding:6px}
.share{text-align:center;font-size:.86rem;color:var(--accent-d);font-weight:700;background:#fff6ee;border-radius:12px;padding:12px;margin:6px 0}
.notice{font-size:.74rem;color:var(--sub);line-height:1.5;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:16px}
.empty{text-align:center;padding:30px 14px;color:var(--sub)}
.empty button{margin-top:14px;border:none;background:var(--accent);color:#fff;font-weight:800;border-radius:999px;padding:12px 24px;font-size:.95rem;cursor:pointer}
footer{text-align:center;font-size:.72rem;color:var(--sub);padding:20px 0 30px}
footer a{color:var(--sub)}
</style>
</head>
<body>
<header class="top">
  <h1>🎯 きょうのプラン</h1>
  <p>質問に答えるだけ、家族のおでかけを自動作成</p>
  <a class="home" href="./index.html">← マップにもどる</a>
</header>

<div class="wrap">
  <div class="dots" id="dots" aria-hidden="true">
    <span class="d"></span><span class="d"></span><span class="d"></span><span class="d"></span>
  </div>

  <!-- STEP 1: 出発地 -->
  <section class="step" data-step="0">
    <div class="q">どこから出発？</div>
    <p class="qsub">おでかけのスタート地点を選んでね</p>
    <select class="origin" id="originSel"></select>
    <button class="geo" id="geoBtn">📍 現在地から探す</button>
    <p class="geonote" id="geoNote"></p>
    <div class="navrow">
      <span></span>
      <button class="next" data-next>次へ →</button>
    </div>
  </section>

  <!-- STEP 2: いつ -->
  <section class="step" data-step="1">
    <div class="q">いつ出かける？</div>
    <p class="qsub">お天気を自動でチェックします</p>
    <div class="bigbtns" id="whenBtns">
      <button class="bigbtn" data-when="today">今日これから<small>いまから準備してGO</small></button>
      <button class="bigbtn" data-when="tomorrow">明日<small>あしたのおでかけ</small></button>
      <button class="bigbtn" data-when="sat">今週末（土）</button>
      <button class="bigbtn" data-when="sun">今週末（日）</button>
    </div>
    <div class="navrow">
      <button class="back" data-back>← もどる</button>
      <button class="next" data-next disabled>次へ →</button>
    </div>
  </section>

  <!-- STEP 3: 年齢 -->
  <section class="step" data-step="2">
    <div class="q">お子さんの年齢は？</div>
    <p class="qsub">あてはまるものを選んでね（複数OK）</p>
    <div class="grid2" id="ageBtns">
      <button class="bigbtn" data-age="0-2">0〜2歳<small>あかちゃん</small></button>
      <button class="bigbtn" data-age="3-5">3〜5歳<small>未就学</small></button>
      <button class="bigbtn" data-age="elem" style="grid-column:1/3">小学生</button>
    </div>
    <div class="navrow">
      <button class="back" data-back>← もどる</button>
      <button class="next" data-next disabled>次へ →</button>
    </div>
  </section>

  <!-- STEP 4: 予算 -->
  <section class="step" data-step="3">
    <div class="q">予算は？</div>
    <p class="qsub">1家族あたりの目安でOK</p>
    <div class="bigbtns" id="budgetBtns">
      <button class="bigbtn" data-budget="free">🆓 無料メイン<small>お金をかけずに遊びたい</small></button>
      <button class="bigbtn" data-budget="1000">〜1,000円</button>
      <button class="bigbtn" data-budget="3000">〜3,000円</button>
      <button class="bigbtn" data-budget="any">気にしない</button>
    </div>
    <div class="navrow">
      <button class="back" data-back>← もどる</button>
      <button class="next" data-next disabled id="genBtn">🎯 プランを作る</button>
    </div>
  </section>

  <!-- LOADING -->
  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <p style="color:var(--sub);font-size:.9rem">お天気とスポットを調べて<br>プランを組み立てています…</p>
  </div>

  <!-- RESULT -->
  <section id="result"></section>
</div>

<footer>
  <a href="./index.html">あいち子育ておでかけマップ</a><br>
  データ・掲載情報は各公式サイトでご確認ください
</footer>

const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function haversineKm(la1,lo1,la2,lo2){
  const R=6371,d2r=Math.PI/180;
  const dLa=(la2-la1)*d2r,dLo=(lo2-lo1)*d2r;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*d2r)*Math.cos(la2*d2r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
// minutes ≈ 18.3 + 1.244*km (回帰式)
function driveMinutesFrom(o,s){
  if(s.latitude==null||s.longitude==null) return null;
  if(o.isAnjo && s.estimated_drive_minutes_from_anjo!=null) return s.estimated_drive_minutes_from_anjo;
  const km=haversineKm(o.lat,o.lng,s.latitude,s.longitude);
  let m=Math.round((18.3+1.244*km)/5)*5;
  return m<5?5:m;
}

// price parse: return representative per-person upper number, or null(unknown)
function parsePrice(s){
  if(s.is_free) return 0;
  const t=s.price_text||'';
  if(!t) return null;
  if(/無料|入館無料|入園無料|入場無料/.test(t) && !/有料|円/.test(t.replace(/無料/g,''))) return 0;
  const nums=[];
  const re=/([0-9,]+)\s*円/g; let m;
  while((m=re.exec(t))){ const n=parseInt(m[1].replace(/,/g,''),10); if(!isNaN(n)) nums.push(n); }
  if(!nums.length) return null;
  return Math.max(...nums);
}
const WD=['日','月','火','水','木','金','土'];
// target Date for a "when" choice
function targetDate(when){
  const d=new Date(); d.setHours(0,0,0,0);
  if(when==='today') return d;
  if(when==='tomorrow'){ d.setDate(d.getDate()+1); return d; }
  const dow=d.getDay();
  if(when==='sat'){ let add=(6-dow+7)%7; if(add===0&&new Date().getDay()!==6)add=7; d.setDate(d.getDate()+add); return d; }
  if(when==='sun'){ let add=(0-dow+7)%7; if(add===0&&new Date().getDay()!==0)add=7; d.setDate(d.getDate()+add); return d; }
  return d;
}
// closed check: exclude if closed_days encodes a weekday == target weekday (simple pattern only)
function isClosedOn(s,date){
  const dow=date.getDay();               // 0=日 ... 6=土
  const isWeekend=(dow===0||dow===6);
  const tw=WD[dow];
  const cd=s.closed_days||'';
  const bh=s.business_hours||'';

  // (1) closed_days: weekday chars immediately followed by 曜 （既存: 「日曜」「月曜」等）
  const re=/([日月火水木金土])曜/g; let m; const days=new Set();
  while((m=re.exec(cd))) days.add(m[1]);
  if(days.has(tw)) return true;

  // (2) closed_days: 「土日祝」「土日」「日祝」等 曜なしの週末表記
  //     （例: 防災教育センター=土日祝, トヨタ会館の日祝系）
  if(/土日祝|土日|週末/.test(cd)){ if(isWeekend) return true; }
  else if(/日祝/.test(cd)){ if(dow===0) return true; }        // 日祝→日曜休
  // 「日・祝」「日曜・祝日」等は(1)の日曜で拾えるが、念のため
  if(/(^|[^平])日休|日曜休|日祝休/.test(cd) && dow===0) return true;

  // (3) 週末に平日限定営業の施設を除外
  //     business_hours/closed_days が「月〜金」「平日のみ」等を示し、
  //     かつ土日営業（土日/週末/年中無休）の記載が無い場合
  if(isWeekend){
    const txt=bh+' '+cd;
    const weekdayOnly=/(月[〜～ー\-]金|平日のみ|平日限定|平日のみ営業|平日 ?\d|要予約.*平日|平日 ?要予約)/.test(txt)
      || /^平日/.test(bh.trim());
    const weekendOpen=/土日|週末|土曜|年中無休|土祝|日祝日?営業|土日祝.*(営業|\d{1,2}:\d{2})/.test(txt);
    if(weekdayOnly && !weekendOpen) return true;
  }
  return false;
}
// main stay minutes
function stayMinutes(s){
  const name=s.name||'', pt=s.play_types||[];
  if(/パーク|ランド|ワールド|牧場|ズー|水族館|動物園/.test(name)) return 120;
  if(pt.includes('indoor')&&/遊び|キッズ|プレイ|あそび/.test(name)) return 120;
  if(pt.includes('museum_science')||pt.includes('create')) return 90;
  if(pt.includes('active')||pt.includes('nature')) return 90;
  if(pt.includes('indoor')) return 90;
  return 90;
}
function fmtTime(mins){
  mins=((mins%1440)+1440)%1440;
  const h=Math.floor(mins/60), m=mins%60;
  return h+':'+String(m).padStart(2,'0');
}
function priceLabel(s){
  const p=parsePrice(s);
  if(p===0) return '無料';
  if(p==null) return '料金は公式で確認';
  return '目安 '+p.toLocaleString()+'円〜';
}

/* ===== wizard nav ===== */
const steps=[...document.querySelectorAll('.step')];
const dots=[...document.querySelectorAll('#dots .d')];
function render(){
  steps.forEach(s=>s.classList.toggle('active',+s.dataset.step===step));
  dots.forEach((d,i)=>{ d.classList.toggle('on',i===step); d.classList.toggle('done',i<step); });
  window.scrollTo({top:0,behavior:'smooth'});
}
function canNext(){
  if(step===0) return !!state.origin;
  if(step===1) return !!state.when;
  if(step===2) return state.ages.size>0;
  if(step===3) return !!state.budget;
  return false;
}
function refreshNext(){
  const btn=steps[step].querySelector('[data-next]');
  if(btn) btn.disabled=!canNext();
}
document.querySelectorAll('[data-next]').forEach(b=>b.addEventListener('click',()=>{
  if(!canNext()) return;
  if(step===3){ generate(); return; }
  step++; render(); refreshNext();
}));
document.querySelectorAll('[data-back]').forEach(b=>b.addEventListener('click',()=>{
  if(step>0){ step--; render(); refreshNext(); }
}));

    const o=state.origin;
    const url='https://api.open-meteo.com/v1/forecast?latitude='+o.lat+'&longitude='+o.lng+
      '&daily=weather_code,temperature_2m_max,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=7';
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),6000);
    const r=await fetch(url,{signal:ctrl.signal}); clearTimeout(t);
    if(!r.ok) return null;
    const j=await r.json();
    const td=targetDate(state.when);
    const now=new Date(); now.setHours(0,0,0,0);
    let idx=Math.round((td-now)/86400000); if(idx<0)idx=0; if(idx>6)idx=6;
    const daily=j.daily||{};
    return {
      precip:(daily.precipitation_probability_max||[])[idx],
      tmax:(daily.temperature_2m_max||[])[idx],
      code:(daily.weather_code||[])[idx]
    };
  }catch(e){ return null; }
}

/* ===== plan generation ===== */
function scoreSpot(s,date,w){
  let sc=0;
  // age
  const feats=(s.kid_features||[]).join(' ');
  const pt=s.play_types||[];
  if(state.ages.has('0-2')){
    if(pt.includes('indoor')) sc+=2;
    if(pt.includes('active')) sc+=1;
    if(/おむつ替え|授乳|ベビー/.test(feats)) sc+=2;
  }
  if(state.ages.has('3-5')){
    if(pt.includes('active')||pt.includes('animal')||pt.includes('water')) sc+=2;
    if(pt.includes('indoor')) sc+=1;
  }
  if(state.ages.has('elem')){
    if(pt.includes('create')||pt.includes('active')||pt.includes('vehicle')||pt.includes('museum_science')) sc+=2;
  }
  // heat preference (soft)
  if(w&&w.tmax!=null&&w.tmax>=34){
    if(pt.includes('water')) sc+=3;
    else if(pt.includes('indoor')||s.rain_friendly) sc+=2;
  }
  // free preference on free budget
  if(state.budget==='free'&&s.is_free) sc+=1;
  return sc;
}
function budgetPass(s){
  if(state.budget==='any') return true;
  if(state.budget==='free') return !!s.is_free;
  const p=parsePrice(s);
  if(p==null) return true; // unknown: keep
  if(state.budget==='1000') return p<=1000;
  if(state.budget==='3000') return p<=3000;
  return true;
}
function shuffle(arr,seed){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function buildPool(date,w){
  const o=state.origin;
  const rain=w&&w.precip!=null&&w.precip>=50;
  let cand=SPOTS.filter(s=>{
    if(s.latitude==null) return false;
    const pt=s.play_types||[];
    if(pt.length===1&&pt[0]==='food') return false; // pure food -> lunch only
    const dm=driveMinutesFrom(o,s);
    if(dm==null||dm>60) return false;
    if(!budgetPass(s)) return false;
    if(rain && !(s.indoor_or_outdoor==='indoor'||s.rain_friendly)) return false;
    if(isClosedOn(s,date)) return false;
    return true;
  });
  // score + attach distance
  cand.forEach(s=>{ s.__sc=scoreSpot(s,date,w); s.__dm=driveMinutesFrom(o,s); });
  // sort by score desc then distance asc
  cand.sort((a,b)=> b.__sc-a.__sc || a.__dm-b.__dm);
  // top pool for variety
  return cand.slice(0,12);
}
function pickLunch(main,date){
  const c=SPOTS.filter(s=>{
    if(s===main||s.latitude==null) return false;
    if(!(s.play_types||[]).includes('food')) return false;
    if(isClosedOn(s,date)) return false;
    const km=haversineKm(main.latitude,main.longitude,s.latitude,s.longitude);
    if(km>15) return false;
    s.__km=km; return true;
  });
  c.sort((a,b)=>a.__km-b.__km);
  return c[0]||null;
}
function pickSub(main,date){
  const o=state.origin;
  const c=SPOTS.filter(s=>{
    if(s===main||s.latitude==null) return false;
    if(!s.is_free) return false;
    const km=haversineKm(main.latitude,main.longitude,s.latitude,s.longitude);
    // ~20 min ≈ within about 12km locally
    if(km>12) return false;
    if(isClosedOn(s,date)) return false;
    s.__subkm=km; return true;
  });
  c.sort((a,b)=>a.__subkm-b.__subkm);
  return c[0]||null;
}
function startMinutes(){
  if(state.when==='today'){
    const now=new Date(); let m=now.getHours()*60+now.getMinutes()+30;
    m=Math.ceil(m/30)*30; if(m>19*60)m=13*60; return m;
  }
  return 9*60+30; // 9:30 for tomorrow/weekend
}
function buildPlan(main,date,w){
  const o=state.origin;
  const lunch=pickLunch(main,date);
  const sub=pickSub(main,date);
  const dm=driveMinutesFrom(o,main)||30;
  let t=startMinutes();
  const afternoon = t>=13*60;
  const rows=[];
  rows.push({type:'move',time:t,label:'🚗 移動（約'+dm+'分）',sub:o.name+' → '+main.city});
  t+=dm;
  const stay=stayMinutes(main);
  rows.push({type:'spot',time:t,spot:main,tag:'メイン'});
  t+=stay;
  if(lunch){
    const ldm=Math.max(5,Math.round(haversineKm(main.latitude,main.longitude,lunch.latitude,lunch.longitude)*2.2/5)*5);
    t+=ldm;
    rows.push({type:'spot',time:t,spot:lunch,tag:afternoon?'おやつ・カフェ':'ランチ',food:true});
    t+=60;
  }
  if(sub){
    const sdm=Math.max(5,Math.round(haversineKm(main.latitude,main.longitude,sub.latitude,sub.longitude)*2.2/5)*5);
    t+=sdm;
    rows.push({type:'spot',time:t,spot:sub,tag:'時間が余ったら',opt:true});
    t+=60;
  }
  rows.push({type:'move',time:t,label:'🚗 帰路（約'+dm+'分）',sub:'おつかれさま！'});
  // totals
  const spotsUsed=[main].concat(lunch?[lunch]:[],sub?[sub]:[]);
  let totalDrive=dm*2;
  let known=0, hasUnknown=false, allFree=true;
  spotsUsed.forEach(s=>{ const p=parsePrice(s); if(p==null)hasUnknown=true; else{known+=p; if(p>0)allFree=false;} });
  let cost;
  if(allFree&&!hasUnknown) cost='ほぼ無料（大人1人あたり）';
  else if(known===0&&hasUnknown) cost='料金は各公式サイトで確認';
  else cost='大人1人あたり 目安 '+known.toLocaleString()+'円〜'+(hasUnknown?'（一部要確認）':'');
  return {rows,main,totalDrive,cost};
}
function generatePlans(date,w){
  const pool=buildPool(date,w);
  if(!pool.length) return [];
  // variety: distinct mains for up to 3 variants
  const mains=[];
  for(const s of pool){ if(!mains.includes(s)) mains.push(s); if(mains.length>=3) break; }
  return mains.map(m=>buildPlan(m,date,w));
}

/* ===== render result ===== */
async function generate(){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('dots').style.display='none';
  document.getElementById('loading').style.display='block';
  document.getElementById('result').style.display='none';
  if(typeof gtag==='function') gtag('event','plan_generate',{when:state.when,budget:state.budget});

  state.weather=await fetchWeather();
  const date=targetDate(state.when);
  state.plans=generatePlans(date,state.weather);
  state.variant=0;

  document.getElementById('loading').style.display='none';
  showResult();
}
function whenLabel(){
  const map={today:'今日これから',tomorrow:'明日',sat:'今週末（土）',sun:'今週末（日）'};
  const d=targetDate(state.when);
  return map[state.when]+'・'+(d.getMonth()+1)+'/'+d.getDate()+'（'+WD[d.getDay()]+'）';
}
function weatherBadge(){
  const w=state.weather;
  if(!w) return '';
  if(w.precip!=null&&w.precip>=50) return '<div class="wxbadge">☔ 雨予報なので室内プランにしました</div>';
  if(w.tmax!=null&&w.tmax>=34) return '<div class="wxbadge">🥵 猛暑予報（最高'+Math.round(w.tmax)+'℃）水遊び・室内を優先しました</div>';
  if(w.tmax!=null) return '<div class="wxbadge">☀ お天気よさそう（最高'+Math.round(w.tmax)+'℃）</div>';
  return '';
}
function rowHtml(r){
  if(r.type==='move'){
    return '<div class="tl move"><div class="rail"><span class="time">'+fmtTime(r.time)+'</span>'+
      '<span class="icon">🚗</span><span class="line"></span></div>'+
      '<div class="body"><div class="sname">'+esc(r.label)+'</div><div class="meta">'+esc(r.sub)+'</div></div></div>';
  }
  const s=r.spot;
  const links='<div class="links">'+
    (s.official_url?'<a href="'+esc(s.official_url)+'" target="_blank" rel="noopener" onclick="track(\'official\')">公式サイト↗</a>':'')+
    (s.google_maps_url?'<a class="map" href="'+esc(s.google_maps_url)+'" target="_blank" rel="noopener" onclick="track(\'maps\')">地図で見る↗</a>':'')+
    '</div>';
  return '<div class="tl"><div class="rail"><span class="time">'+fmtTime(r.time)+'</span>'+
    '<span class="icon">'+spotEmoji(s)+'</span><span class="line"></span></div>'+
    '<div class="body">'+
    (r.opt?'<span class="opt">⏱ 時間が余ったら</span><br>':'')+
    '<div class="sname">'+esc(s.name)+' <small style="font-weight:600;color:var(--sub);font-size:.75rem">/ '+esc(r.tag)+'・'+esc(s.city)+'</small></div>'+
    (s.kid_appeal?'<div class="appeal">'+esc(s.kid_appeal)+'</div>':'')+
    '<div class="meta">💴 '+esc(priceLabel(s))+(s.business_hours?'　🕐 '+esc(s.business_hours):'')+'</div>'+
    links+'</div></div>';
}
function track(w){ if(typeof gtag==='function') gtag('event','plan_outlink',{link:w}); }
function showResult(){
  const res=document.getElementById('result');
  res.style.display='block';
  if(!state.plans.length){
    res.innerHTML='<div class="empty"><p>条件に合うスポットが見つかりませんでした。<br>予算や出発地を変えると見つかりやすくなります。</p>'+
      '<button onclick="restart()">条件を変えてやり直す</button></div>';
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  const p=state.plans[state.variant%state.plans.length];
  const total=Math.floor(p.totalDrive/60), tm=p.totalDrive%60;
  const driveStr=(total?total+'時間':'')+(tm?tm+'分':'')||'0分';
  let html='';
  html+='<div style="text-align:center">'+weatherBadge()+'</div>';
  html+='<div class="plancard">';
  html+='<div class="plantitle">🎯 '+esc(state.origin.name)+'発 きょうのプラン <small>'+esc(whenLabel())+' / 案'+(state.variant%state.plans.length+1)+'</small></div>';
  html+='<div class="timeline">'+p.rows.map(rowHtml).join('')+'</div>';
  html+='<div class="summary">🚗 移動の目安 <b>約'+driveStr+'</b>（往復）　／　💰 <b>'+esc(p.cost)+'</b></div>';
  html+='</div>';
  html+='<div class="share">📸 スクショして家族に送ってね！</div>';
  html+='<div class="actions">';
  html+='<button class="act-reroll" onclick="reroll()">🔄 別のプランにする</button>';
  html+='<a class="act-map" href="./index.html" onclick="track(\'map\')">🗺 地図でこのへんを見る</a>';
  html+='<button class="act-restart" onclick="restart()">最初からやり直す</button>';
  html+='</div>';
  html+='<div class="notice">⚠ 所要時間・料金・営業時間は目安です。おでかけ前に各公式サイトをご確認ください。'+
    (state.weather?'':'<br>※ 現在お天気情報を取得できなかったため、天気条件なしでプランを作成しています。')+'</div>';
  res.innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}
function reroll(){
  if(typeof gtag==='function') gtag('event','plan_reroll');
  state.variant++;
  showResult();
}
function restart(){
  state.when=null; state.ages.clear(); state.budget=null; state.weather=null; state.variant=0; state.plans=[];
  document.querySelectorAll('.bigbtn.on').forEach(b=>b.classList.remove('on'));
  document.getElementById('result').style.display='none';
  document.getElementById('dots').style.display='flex';
  step=0; render();
  steps.forEach(s=>{ const n=s.querySelector('[data-next]'); if(n&&+s.dataset.step!==0) n.disabled=true; });
  refreshNext();
}

/* init */
render(); refreshNext();
</script>
